services:
  postgres:
    image: postgres:16-alpine
    container_name: agenda-facil-postgres
    environment:
      POSTGRES_DB: agenda_facil
      POSTGRES_USER: agenda
      POSTGRES_PASSWORD: agenda
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
