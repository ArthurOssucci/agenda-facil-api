spring:
  application:
    name: agenda-facil-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agenda_facil}
    username: ${DB_USER:agenda}
    password: ${DB_PASSWORD:agenda}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  error:
    include-message: always

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-change-this-secret-change-this-secret}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
